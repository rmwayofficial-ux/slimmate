<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#4ECDC4" />
  <meta name="description" content="運動を記録して消費カロリーを見える化。ゆるキャラ「あるるん」とスタンプで毎日続く、あなたのスリム相棒。" />
  <title>slimmate — スリムの相棒</title>

  <!-- Open Graph / SNS シェア -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="slimmate" />
  <meta property="og:title" content="slimmate — スリムの相棒" />
  <meta property="og:description" content="運動と食事を記録して、ゆるキャラ「あるるん」と毎日つづける。スタンプ・称号レベル・着せ替えで楽しく習慣化。" />
  <meta property="og:url" content="https://rmwayofficial-ux.github.io/slimmate/" />
  <meta property="og:image" content="https://rmwayofficial-ux.github.io/slimmate/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ja_JP" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="slimmate — スリムの相棒" />
  <meta name="twitter:description" content="運動と食事を記録して、ゆるキャラ「あるるん」と毎日つづける。" />
  <meta name="twitter:image" content="https://rmwayofficial-ux.github.io/slimmate/og-image.png" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">🌿</span>
        <span class="brand-name">slim<span>mate</span></span>
      </div>
      <div class="header-actions">
        <div id="streakChip" class="streak-chip" hidden>
          <span class="flame">🔥</span><span id="streakChipNum">0</span>日連続
        </div>
        <button id="helpBtn" class="help-pill" aria-label="ヘルプ・使い方・ご意見">❓ <span>使い方</span></button>
      </div>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" id="tabbar">
      <button class="tab" data-tab="home">
        <span class="tab-ico">🏠</span><span class="tab-label">ホーム</span>
      </button>
      <button class="tab" data-tab="log">
        <span class="tab-ico">🏃</span><span class="tab-label">運動</span>
      </button>
      <button class="tab" data-tab="food">
        <span class="tab-ico">🍽️</span><span class="tab-label">食事</span>
      </button>
      <button class="tab" data-tab="stamps">
        <span class="tab-ico">🏆</span><span class="tab-label">スタンプ</span>
      </button>
      <button class="tab" data-tab="settings">
        <span class="tab-ico">⚙️</span><span class="tab-label">設定</span>
      </button>
    </nav>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
